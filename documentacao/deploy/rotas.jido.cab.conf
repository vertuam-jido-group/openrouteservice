# Openrouteservice — rotas.jido.cab
# Destino na VM: /etc/nginx/sites-available/rotas.jido.cab
# Docs: documentacao/03-nginx-https.md
#
# ANTES DE ATIVAR:
#   1. Gerar a chave:  openssl rand -hex 32
#   2. Substituir TROCAR-PELA-CHAVE-GERADA abaixo
#   3. Declarar a zona de rate limit no http {} do /etc/nginx/nginx.conf:
#        limit_req_zone $binary_remote_addr zone=ors:10m rate=10r/s;
#
# O certbot adiciona o bloco 443 e o redirect automaticamente:
#   sudo certbot --nginx -d rotas.jido.cab

server {
    listen 80;
    server_name rotas.jido.cab;

    # Healthcheck liberado sem API key (para uptime monitor)
    location = /ors/v2/health {
        proxy_pass http://127.0.0.1:8082;
        proxy_set_header Host $host;
    }

    location / {
        # --- API key via header x-api-key ---
        if ($http_x_api_key != "TROCAR-PELA-CHAVE-GERADA") {
            return 401 '{"error": "unauthorized"}';
        }

        # --- Rate limit (zona "ors" declarada no nginx.conf) ---
        limit_req zone=ors burst=20 nodelay;

        proxy_pass http://127.0.0.1:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Requests longos (matriz grande, isocronas)
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;

        # Body de requests POST (matriz) pode ser grande
        client_max_body_size 10m;
    }
}
